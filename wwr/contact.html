    <main class="contact-main">
        <div class="address">

            <h1>White Water Rafting Company</h1>
            <p>Address</p>
            <p>City/State</p>
            <p>Phone number</p>
            <p>email</p>
        </div>

        <div class="contact-main-body">


            <!-- google map embed -->
            <div>
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d237286.43352887672!2d-106.96179599680288!3d38.60959082405408!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1780502257714!5m2!1sen!2sus"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form">
                <label>Name: <input type="text" name="name" id="name" required></label>
                <label>Email: <input type="email" name="email" id="email"></label>
                <div class="form-radio">
                    <label for="purpose">Message purpose:</label>
                    <div class="form-radio-options">
                        <div>

                            <input type="radio" id="radio-1" name="purpose">
                            <label for="radio-1">option 1</label>
                        </div>
                        <div>

                            <input type="radio" id="radio-2" name="purpose">
                            <label for="radio-2">option 2</label>
                        </div>
                        <div>

                            <input type="radio" id="radio-3" name="purpose">
                            <label for="radio-3">option 3</label>
                        </div>
                    </div>
                </div>
                <label for="message">Message: </label>
                <textarea name="message" id="message" rows="3"></textarea>
                <label>subscroob? <input name="checkbox" id="checkbox" type="checkbox"></label>
                <button type="submit">Send request</button>
            </form>
        </div>
        <section class="employees">
            <h2>Employees</h2>
            <div>
                <img src="images/profile.webp" alt="grumpy store employee" />
                <img src="images/buff-garfield.jpg" alt="Muscular orange cat" />
                <img src="images/satisfied-face-meme.webp" alt="???" />

                <p>Grumpy Frog</p>
                <p>Buff Garfield</p>
                <p>???</p>

                <i>"The Brains"</i>
                <i>"The Muscle"</i>
                <i>"The ???"</i>

            </div>

        </section>
